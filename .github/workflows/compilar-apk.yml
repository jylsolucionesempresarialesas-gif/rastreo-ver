name: Compilar APK Rastreo VER

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  compilar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Dar permiso a gradle
        run: chmod +x gradlew

      - name: Compilar APK
        run: ./gradlew assembleRegularDebug

      - name: Publicar APK para descargar
        uses: actions/upload-artifact@v4
        with:
          name: rastreo-ver-apk
          path: app/build/outputs/apk/**/*.apk
